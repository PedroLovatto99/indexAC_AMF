
services:
  web:
    build: .
    container_name: web_app
    command: sh -c "python manage.py migrate && python manage.py runserver 0.0.0.0:8000"
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_started
      ollama-pull-models:
        condition: service_completed_successfully
    environment:
      - POSTGRES_NAME=indexAC_amf
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_HOST=db
      - POSTGRES_PORT=5432
      - OLLAMA_HOST=http://ollama:11434

  db:
    image: postgres:15
    container_name: postgres_db
    environment:
      - POSTGRES_DB=indexAC_amf
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  ollama:
    image: ollama/ollama:latest
    container_name: ollama_service
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
#    deploy:
#      resources:
#        reservations:
#          devices:
#            - driver: nvidia
#              count: 1
#              capabilities: [gpu]

  ollama-pull-models:
    image: curlimages/curl:latest
    container_name: ollama_model_puller
    depends_on:
      - ollama
    command: >
      sh -c "
      echo 'Waiting for Ollama to be ready...' &&
      while ! curl -s http://ollama:11434/api/tags > /dev/null; do sleep 2; done &&
      echo 'Ollama is ready. Downloading llama3.1...' &&
      curl -X POST http://ollama:11434/api/pull -d '{\"name\": \"llama3.1\"}' &&
      echo 'Downloading minicpm-v...' &&
      curl -X POST http://ollama:11434/api/pull -d '{\"name\": \"minicpm-v\"}' &&
      echo 'Models downloaded successfully.'
      "

volumes:
  postgres_data:
  ollama_data:
